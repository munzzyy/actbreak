name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install the package (no runtime dependencies)
        run: pip install -e .

      - name: Install test tools
        run: pip install pytest

      - name: Run tests with unittest (zero deps beyond the package itself)
        run: python -m unittest -v

      - name: Run tests with pytest
        run: pytest -v

      - name: Smoke-test the CLI
        run: |
          actbreak --version
          actbreak --help
          actbreak run --help

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install the package and pytest
        run: pip install -e ".[dev]"

      - name: Install act
        run: curl -s https://raw.githubusercontent.com/nektos/act/master/install.sh | sudo bash

      - name: Run the integration test (real act + docker)
        run: pytest -v -m integration
